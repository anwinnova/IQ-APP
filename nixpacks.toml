# nixpacks.toml
# Tells Railway which system packages to install before pip install
# faster-whisper needs: ffmpeg (audio decoding), libsndfile1, libgomp1 (OpenMP)
# gTTS needs: internet access (built-in on Railway)

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[phases.setup]
nixPkgs = [
  "python311",
  "ffmpeg",
  "libsndfile",
  "stdenv.cc.cc.lib",
]

[phases.install]
cmds = [
  "python3 -m pip install --upgrade pip --break-system-packages",
  "python3 -m pip install -r requirements.txt --break-system-packages",
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"